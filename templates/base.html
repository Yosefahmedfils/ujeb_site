<!DOCTYPE html>
<html lang="fr">
{% load static %}

<head>
    <meta charset="UTF-8">
    <title>UJEB</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- STYLE -->
    <style>
    .activity-card {
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    background: #fff;
}
.fade-left {
    opacity: 0;
    transform: translateX(-50px);
    transition: 0.8s;
}

.fade-left.show {
    opacity: 1;
    transform: translateX(0);
}

.activity-card:hover {
    transform: translateY(-10px);
}



.activity-img {
    height: 220px;
    width: 100%;
    object-fit: cover;
}
    body {
        background-color: #f8f9fa;
    }

    /* TITRES */
    .section-title h2 {
        font-weight: bold;
        position: relative;
    }

    .line {
        width: 60px;
        height: 4px;
        background: #198754;
        margin: 10px auto;
        border-radius: 10px;
    }

    /* CARDS */
    .card {
        border-radius: 15px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    /* IMAGES */
    img {
        transition: 0.3s;
    }

    img:hover {
        transform: scale(1.05);
    }

    /* ANIMATION */
    .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition: 0.6s;
    }

    .fade-in.show {
        opacity: 1;
        transform: translateY(0);
    }

    /* COMPTEUR */
    .counter {
        font-size: 40px;
        font-weight: bold;
        color: #198754;
    }
       .navbar {
    background-color: transparent !important;
}

.navbar a,
.navbar .nav-link {
    color: black !important;
}

    </style>

</head>

<body>

<nav id="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top">

  <div class="container">

    <!-- LOGO -->

        <strong>UJEB</strong>
    </a>

    <a class="btn btn-success ms-3" href="{% url 'join' %}">
    Adhérer
    </a>
    <!-- MENU MOBILE -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto align-items-center">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}">Accueil</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'members' %}">Membres</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'about' %}">À propos</a>
            </li>

            <li class="nav-item ms-3">
                <a class="btn btn-success" href="{% url 'contact' %}">
                    Contact
                </a>
            </li>

        </ul>
    </div>

  </div>

</nav>

<!-- CONTENU -->
{% block content %}{% endblock %}

<!-- WHATSAPP FLOAT -->

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4 mt-5">

    <h5>UJEB</h5>
    <p>Union des Jeunes pour l’Évolution du Bahr-El-Gazel</p>

   <!-- COLONNE 3 : CONTACT -->
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold">Contact</h5>
                <p>📍 Tchad</p>
                <p>📞 +235 66 80 84 10</p>
                <p>📧 contact@ujeb.org</p>

                <!-- RÉSEAUX -->
                <div class="social-icons mt-3">
                    <a href="#"><i class="bi bi-facebook"></i></a>
                    <a href="#"><i class="bi bi-whatsapp"></i></a>
                    <a href="#"><i class="bi bi-envelope"></i></a>
                </div>
            </div>


    <p class="mt-3">© 2026 Tous droits réservés</p>

</footer>

<script>
window.addEventListener("scroll", function() {
    let navbar = document.getElementById("navbar");

    if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
    } else {
        navbar.classList.remove("scrolled");
    }
});
</script>
<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- ANIMATION SCROLL -->
<script>
window.addEventListener('scroll', function() {
    let elements = document.querySelectorAll('.fade-in');

    elements.forEach(el => {
        let position = el.getBoundingClientRect().top;
        let screen = window.innerHeight;

        if(position < screen - 100){
            el.classList.add('show');
        }
    });
});
</script>
<script>
function revealOnScroll() {
    let elements = document.querySelectorAll('.fade-in');

    elements.forEach(el => {
        let position = el.getBoundingClientRect().top;
        let screenHeight = window.innerHeight;

        if (position < screenHeight - 100) {
            el.classList.add('show');
        }
    });
}

window.addEventListener('scroll', revealOnScroll);
window.addEventListener('load', revealOnScroll);
</script>


</body>
</html>
