{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.member-card {
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    background: white;
}

.member-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.member-img {
    height: 250px;
    width: 100%;
    object-fit: cover;
}

.member-info {
    padding: 15px;
}

.member-name {
    font-weight: bold;
}

.member-role {
    color: gray;
    font-size: 14px;
}

/* Animation */
.fade-up {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

.fade-up.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

<div class="container py-5">

    <!-- TITRE -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">Nos Membres</h1>
        <div class="line"></div>
        <p class="text-muted">Une équipe engagée pour le développement</p>
    </div>

    <!-- GRID -->
    <div class="row">

        {% for member in members %}
        <div class="col-md-3 col-6 mb-4 fade-up">

            <div class="member-card">

                {% if member.image %}
                <img src="{{ member.image.url }}" class="member-img">
                {% else %}
                <img src="https://via.placeholder.com/300x250" class="member-img">
                {% endif %}

                <div class="member-info text-center">
                    <div class="member-name">{{ member.name }}</div>
                    <div class="member-role">{{ member.role }}</div>
                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

<!-- ANIMATION -->
<script>
window.addEventListener('scroll', function() {
    let elements = document.querySelectorAll('.fade-up');

    elements.forEach(el => {
        let position = el.getBoundingClientRect().top;
        let screen = window.innerHeight;

        if(position < screen - 100){
            el.classList.add('show');
        }
    });
});
</script>

{% endblock %}
